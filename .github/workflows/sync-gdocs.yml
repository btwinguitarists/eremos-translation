name: Sync reader edition to Google Docs

on:
  push:
    branches:
      - main
    paths:
      - 'output/reader/**'
      - 'scripts/sync_to_gdocs.py'
      - '.github/workflows/sync-gdocs.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Google API clients
        run: pip install --quiet google-api-python-client google-auth

      - name: Sync output/reader/ to Drive
        env:
          OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python3 scripts/sync_to_gdocs.py
